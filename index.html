<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOOKA - 嗨，歡迎您的到來</title>
    <style>
        /* 基礎樣式：設定為黑底白字 */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 導覽列：模擬截圖上方的簡約風格 */
        header {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .menu-icon {
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* 主要內容區 */
        main {
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
            text-align: center;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 標題與段落文字設定 */
        h1 {
            font-size: 2rem;
            font-weight: normal;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        p {
            font-size: 1rem;
            line-height: 1.8;
            margin: 10px 0;
            color: rgba(255, 255, 255, 0.8); /* 稍微調暗一點點，讓閱讀更舒適 */
        }

        /* 圖片設定：模擬截圖中的展示方式 */
        .story-image-container {
            margin-top: 40px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .story-image {
            max-width: 100%;
            height: auto;
            border-radius: 4px; /* 微小的圓角，增加質感 */
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1); /* 淡淡的白色光暈 */
        }

        /* 腳步空間：防止圖片貼到底部 */
        footer {
            height: 50px;
        }

        /* 響應式調整：在小螢幕手機上縮小標題字體 */
        @media (max-width: 600px) {
            h1 { font-size: 1.6rem; }
            header { padding: 15px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">YOOKA</div>
        <div class="menu-icon">&#9776;</div> </header>

    <main>
        <h1>嗨，歡迎您的到來</h1>

        <p>這是我以tuki.的歌曲</p>
        <p>〔地獄恋文〕所創作的故事。</p>

        <p>姑且是個二次創作的小作品</p>
        <p>總之希望會喜歡！</p>

        <div class="story-image-container">
            <img src="https://image-service.webnode.com/v2/imagestory/2.cms.webnode.page/7b6f6580-ff67-4e6f-9989-b02f5a6f235d/tuki.%E5%9C%B0%E7%8D%84%E6%81%8B%E6%96%87.jpeg?ws=normal&ver=1" alt="地獄恋文故事插圖" class="story-image">
        </div>
    </main>

    <footer></footer>

</body>
</html>
